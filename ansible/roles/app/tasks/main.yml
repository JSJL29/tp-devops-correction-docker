- name: Run Spring App
  docker_container:
    name: simple-api
    image: jsjllegoat/tp-devops-simple-api
    networks:
      - name: app-network
    env:
      DATABASE_HOST: database
      DATABASE_PORT: "5432"
      DATABASE_NAME: db
      DATABASE_USER: usr
      DATABASE_PASSWORD: pwd
      SPRING_DATASOURCE_URL: "jdbc:postgresql://database:5432/db"
      SPRING_DATASOURCE_USERNAME: "usr"
      SPRING_DATASOURCE_PASSWORD: "pwd"
