name: Continuous Deployment

on:
  # On ne lance le déploiement QUE si le workflow CD (build/tag) a réussi
  workflow_run:
    workflows: ["Continuous Delivery"]
    types:
      - completed

jobs:
  deploy:
    # On vérifie que le workflow précédent a réussi et n'a pas échoué
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'
        run: |
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          ansible-playbook -i setup.yml playbook.yml --private-key id_rsa
          rm id_rsa # Sécurité : on supprime la clé après usage