name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Delivery"]
    types:
      - completed

jobs:
  deploy:
    # On ne lance le déploiement que si le workflow précédent est un succès
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    # C'EST CETTE LIGNE QUI ACTIVE LA VALIDATION MANUELLE
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy with Ansible
        working-directory: ansible 
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'
        run: |
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          # On utilise ./id_rsa car le fichier est créé dans le dossier ansible/
          ansible-playbook -i setup.yml playbook.yml --private-key id_rsa -u admin
          rm id_rsa