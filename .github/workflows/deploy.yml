name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Delivery"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy with Ansible
        # On se place dans le dossier où sont tes fichiers setup.yml et playbook.yml
        working-directory: ansible 
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'
        run: |
          # 1. On écrit la clé privée récupérée des secrets GitHub
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > id_rsa
          chmod 600 id_rsa
          
          # 2. On lance le playbook en forçant l'utilisation de la clé id_rsa locale
          # Note : remplace 'admin' après -u si ton utilisateur serveur est différent
          ansible-playbook -i setup.yml playbook.yml --private-key id_rsa -u admin
          
          # 3. On nettoie la clé après le déploiement
          rm id_rsa