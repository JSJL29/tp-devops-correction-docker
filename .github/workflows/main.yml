name: CI CD devops 2026
on:
  push:
    branches: 
      - main
      - develop
  pull_request:

permissions:
  contents: write

jobs:
  # --- NOUVEAU JOB : Calcul de la version ---
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour voir les tags
      - id: versioning
        run: |
          # Récupère le dernier tag, sinon initialise à v0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0")
          echo "Dernier tag trouvé : $LATEST_TAG"
          
          # Extraction de la version majeure (ex: v1.0 -> 1)
          VERSION=$(echo $LATEST_TAG | sed 's/v//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          
          # Incrémentation de la majeure et remise à zéro de la mineure
          NEW_MAJOR=$((MAJOR + 1))
          NEW_TAG="v$NEW_MAJOR.0"
          
          echo "Nouvelle version calculée : $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------
  # PARTIE 1 : CI - TEST ET QUALITÉ
  # ---------------------------------------------------------
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test with Maven
        run: mvn clean verify --file simple-api/pom.xml

  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: SonarCloud Scan
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=JSJL29_tp-devops-correction-docker \
            -Dsonar.organization=jsjl29 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --file simple-api/pom.xml

  # ---------------------------------------------------------
  # PARTIE 2 : CD - PUBLICATION (Uniquement sur MAIN)
  # ---------------------------------------------------------
  
  build-and-push-backend:
    needs: [sonar-analysis, compute-version]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:${{ needs.compute-version.outputs.new_version }}

  build-and-push-database:
    needs: [sonar-analysis, compute-version]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:${{ needs.compute-version.outputs.new_version }}

  build-and-push-httpd:
    needs: [sonar-analysis, compute-version]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push HTTPD
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:${{ needs.compute-version.outputs.new_version }}

  # ---------------------------------------------------------
  # PARTIE 3 : TAGGING GITHUB
  # ---------------------------------------------------------
  create-git-tag:
    needs: [compute-version, build-and-push-backend, build-and-push-database, build-and-push-httpd]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.compute-version.outputs.new_version }}
          git push origin ${{ needs.compute-version.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}