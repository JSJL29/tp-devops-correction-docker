name: CI CD devops 2026
on:
  push:
    branches: 
      - main
      - develop
  pull_request:

# Autorise le workflow à écrire des tags dans le repo
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------
  # PARTIE 1 : CI - TEST ET QUALITÉ (Toujours exécuté)
  # ---------------------------------------------------------
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test with Maven
        run: mvn clean verify --file simple-api/pom.xml

  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: SonarCloud Scan
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=JSJL29_tp-devops-correction-docker \
            -Dsonar.organization=jsjl29 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --file simple-api/pom.xml

  # ---------------------------------------------------------
  # PARTIE 2 : CD - PUBLICATION (Uniquement sur MAIN)
  # ---------------------------------------------------------
  
  build-and-push-backend:
    needs: sonar-analysis
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:v${{ github.run_number }}

  build-and-push-database:
    needs: sonar-analysis
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push Database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:v${{ github.run_number }}

  build-and-push-httpd:
    needs: sonar-analysis
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push HTTPD
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:v${{ github.run_number }}

  # ---------------------------------------------------------
  # PARTIE 3 : TAGGING GITHUB (Après le succès du déploiement)
  # ---------------------------------------------------------
  create-git-tag:
    needs: [build-and-push-backend, build-and-push-database, build-and-push-httpd]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour pouvoir tagger
      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ github.run_number }}
          git push origin v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}