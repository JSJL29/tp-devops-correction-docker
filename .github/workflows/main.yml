name: CI CD devops 2026
on:
  push:
    branches: 
      - main
      - develop
    tags:
      - 'v*' # Déclenche la partie CD quand tu crées un tag (ex: v1.0)
  pull_request:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------
  # PARTIE 1 : CI (Toujours exécutée)
  # ---------------------------------------------------------
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test with Maven
        run: mvn clean verify --file simple-api/pom.xml

  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: SonarCloud Scan
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=JSJL29_tp-devops-correction-docker \
            -Dsonar.organization=jsjl29 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --file simple-api/pom.xml

  # ---------------------------------------------------------
  # PARTIE 2 : CD (Uniquement quand tu pousses un TAG v...)
  # ---------------------------------------------------------
  build-and-push-docker:
    needs: sonar-analysis
    # Condition : Ne tourne que si on a créé un tag commençant par 'v'
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
      
      # Build du Backend avec ton tag Git
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:${{ github.ref_name }}

      # Build de la Database avec ton tag Git
      - name: Build and push Database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:${{ github.ref_name }}

      # Build du serveur HTTP avec ton tag Git
      - name: Build and push HTTPD
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:${{ github.ref_name }}